name: Test CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        check-latest: true

    - name: Download Dependencies
      run: go mod download

    - name: Format Check
      run: go fmt ./...

    - name: Vet
      run: go vet ./...

    - name: Run Tests
      run: go test ./... -v -count=1